{% set python_min = "3.10" %}
{% set python_max = "3.12.12" %}
{% set name = "reskit" %}
{% set version = "0.4.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/FZJ-IEK3-VSA/RESKit/archive/v{{ version }}.tar.gz
  sha256: 748959da36f136f529e5e3d69b8eaf97d605d345a26ead6404e9f4ff4934e867

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python 
    - python >={{ python_min }},<={{ python_max }}
    - papermill <=2.6.0
    - jupyter <=1.1.1
    - pip <=25.3
    - matplotlib <=3.10.5
    - descartes <=1.1.0
    - pandas >=1.4.0,<=2.3.3
    - openpyxl <=3.1.5
    - numpy >=1.21.5,<=1.26.4
    - numba >=0.55,<=0.62.1
    - scipy >=1.7.2,<=1.14.1
    - scikit-learn >=1.3.0,<=1.7.1
    - geokit >=1.4.0,<=1.6.0
    - netcdf4 >=1.5.8,!=1.6.3,<=1.7.3
    - xarray >=0.16.0,<=2025.11.0
    - pvlib-python =0.9.0
    - windpowerlib =0.2.1
    - cdsapi <=0.7.7



test:
  imports:
    - reskit
  commands:
    - conda list
    - python -m pytest
  source_files:
    - test/
  requires:
    - python ={{ python_min }}
    - pytest
    - pytest-cov

about:
  home: 'https://github.com/FZJ-IEK3-VSA/reskit'
  license: CC-BY-4.0 AND MIT
  license_file:
    - LICENSE-CC-BY.txt
    - LICENSE-MIT.txt
  summary: Renewable Energy Simulation toolkit

extra:
  recipe-maintainers:
    - chrisjwin
    - julian-belina
    - phil-fzj
